server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: event-bridge
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/eventbridge}
      database: eventbridge
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:EventBridge2024SuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
    access-token-expiration: 86400000   # 24 hours
    refresh-token-expiration: 604800000 # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8081}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.eventbridge: DEBUG
    org.springframework.security: INFO
