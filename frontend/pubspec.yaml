name: event_bridge
description: Event Management and Communication Platform for Colleges
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  json_annotation: ^4.9.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  web_socket_channel: ^3.0.1
  stomp_dart_client: ^2.0.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  badges: ^3.1.2
  timeago: ^3.6.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
